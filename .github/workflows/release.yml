name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build-python-package:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest

      - name: Ruff check
        run: |
          ruff check .

      - name: Ruff format
        run: |
          ruff format --check .

      - name: Verify tag matches version
        shell: python
        run: |
          import os
          import sctmgtool

          tag = os.environ["GITHUB_REF_NAME"]
          if tag != f"v{sctmgtool.__version__}":
              raise SystemExit(
                  f"Tag {tag} != version {sctmgtool.__version__}"
              )

          print(f"Version OK: {sctmgtool.__version__}")

      - name: Build the packages
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: python-package-dist
          path: dist/

  build-windows-binary:
    name: Build Windows binary (PyInstaller)
    needs: build-python-package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build EXE
        run: |
          pyinstaller src/sctmgtool/__main__.py `
            --onefile `
            --noconsole `
            --clean `
            --icon assets/icon.png `
            --name "SCTMGTool"

      - name: Add support files
        shell: pwsh
        run: |
          Copy-Item README.md dist\
          Copy-Item LICENSE dist\
          Copy-Item src\sctmgtool\units\NOTICE.txt dist\

      - name: Zip executable
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist\* `
            -DestinationPath "SCTMGTool-$($env:GITHUB_REF_NAME).zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-binary
          path: "SCTMGTool-${{ github.ref_name }}.zip"

  draft-github-release:
    name: Create draft GitHub Release
    needs: [build-python-package, build-windows-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: windows-binary
          path: release-assets/

      - uses: actions/download-artifact@v8
        with:
          name: python-package-dist
          path: release-assets/

      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: release-assets/*
          generate_release_notes: true
