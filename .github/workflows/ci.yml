name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        if: matrix.python-version != '3.14'
        run: |
          pytest

      - name: Ruff check
        if: matrix.python-version == '3.14'
        run: |
          ruff check .

      - name: Ruff format
        if: matrix.python-version == '3.14'
        run: |
          ruff format --check .

      - name: Coverage
        if: matrix.python-version == '3.14'
        run: |
          pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml
